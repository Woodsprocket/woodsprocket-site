<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodsprocket Studios LLC</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav id="global-nav"></nav>

<script>
    // Fetch Navigation
    fetch('/nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('global-nav').innerHTML = data;
        })
        .catch(() => {
            document.getElementById('global-nav').innerHTML =
                '<div class="nav-container"><a href="/" class="brand-name">WOODSPROCKET STUDIOS</a></div>';
        });

    // Fetch Footer
    fetch('/footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('global-footer').innerHTML = data;
        })
        .catch(() => {
            document.getElementById('global-footer').innerHTML =
                '<div class="footer-container"><p>&copy; 2026 Woodsprocket Studios LLC. All rights reserved.</p></div>';
        });
</script>

    <main>
        <section class="hero">
            <img src="/logo.png" alt="Woodsprocket Studios" class="main-logo">
            <div class="hero-content">
                <h1>Independent software development for iOS.</h1>
                <p>Woodsprocket Studios LLC is a specialized development studio based in Rome, Georgia.</p>
            </div>
        </section>

        <div class="divider"></div>

        <section class="details-grid">
            <div class="detail-item">
                <h3>Active Project</h3>
                <img src="/apps/assets/tumble_sort_icon.png" alt="Tumble Sort Icon" class="app-icon">
                <h2>Tumble Sort</h2>
                <p>In Pre-Launch. Built for iOS.</p>
            </div>

            <div class="detail-item">
                <h3>Contact</h3>
                <h2>Inquiries & Support</h2>
                <a href="mailto:info@woodsprocket.com" class="contact-link">info@woodsprocket.com</a>
            </div>
        </section>
    </main>

<footer id="global-footer"></footer>

</body>
</html>
