<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Woodsprocket Studios</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav id="global-nav"></nav>

    <main>
        <section class="prose" style="text-align: center;">
            <h1>Contact Woodsprocket</h1>
            <p class="subtitle">Have a question about one of our apps or want to discuss a project? Drop us a line below.</p>
        </section>

        <section class="contact-section" style="max-width: 600px; margin: 0 auto 100px auto; padding: 0 20px;">
            
            <form action="https://formspree.io/f/mykvwpld" method="POST" class="ws-form" id="ws-contact-form">
                <div class="form-group">
                    <input type="text" name="name" id="name" placeholder="Name" required>
                </div>
                
                <div class="form-group">
                    <input type="email" name="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <select name="inquiry_type" id="inquiry_type" required>
                        <option value="" disabled selected>Select Inquiry Type...</option>
                        <option value="App Support">App Support</option>
                        <option value="General Inquiry">General Inquiry</option>
                        <option value="Business / Press">Business / Press</option>
                    </select>
                </div>

                <div class="form-group">
                    <textarea name="message" id="message" rows="6" placeholder="How can we help?" required></textarea>
                </div>

                <button type="submit" class="submit-btn" style="width: 100%;">Send Message</button>
            </form>
            
            <p id="form-status" style="display: none; font-weight: 600; font-size: 1.2rem; margin-top: 20px; color: var(--accent);"></p>
            
        </section>
    </main>
    
    <footer id="global-footer"></footer>

    <script>
        // 1. Template Loading (Navigation & Footer)
        fetch('/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-nav').innerHTML = data;
            })
            .catch(() => {
                document.getElementById('global-nav').innerHTML =
                    '<div class="nav-container"><a href="/" class="brand-name">WOODSPROCKET STUDIOS</a></div>';
            });

        fetch('/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-footer').innerHTML = data;
            })
            .catch(() => {
                document.getElementById('global-footer').innerHTML =
                    '<div class="footer-container"><p>&copy; 2026 Woodsprocket Studios LLC. All rights reserved.</p></div>';
            });

        // 2. Form Submission Hijack (Prevents Formspree Redirect)
        var form = document.getElementById("ws-contact-form");
        var statusText = document.getElementById("form-status");

        async function handleSubmit(event) {
            event.preventDefault(); // Stops the browser from navigating away
            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // Hide the form and show the success message
                    form.style.display = "none";
                    statusText.innerHTML = "Thanks! Your message has been sent to Woodsprocket Studios.";
                    statusText.style.display = "block";
                    form.reset();
                } else {
                    statusText.innerHTML = "Oops! There was a problem submitting your form.";
                    statusText.style.display = "block";
                }
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
